<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      try {
        document.documentElement.dataset.theme = localStorage.getItem('rabtpoint_theme') || 'dark';
      } catch (e) {
        document.documentElement.dataset.theme = 'dark';
      }
    </script>
    <meta
      name="description"
      content="RabtPoint is a social location app for finding people by country, state and district, sharing posts, chatting with users, and exploring verified locations on maps."
    />
    <meta
      name="keywords"
      content="RabtPoint, social location app, location based social network, people search, chat app, posts, OSM map, globe map"
    />
    <meta name="application-name" content="RabtPoint" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta property="og:title" content="RabtPoint - Social Location App" />
    <meta
      property="og:description"
      content="Find people by country, state and district, share posts, chat with users, and explore verified locations on OSM and 3D globe maps."
    />
    <meta property="og:url" content="https://rabtpoint.com" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RabtPoint" />
    <meta name="twitter:card" content="summary" />
    <title>RabtPoint - Social Location App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
